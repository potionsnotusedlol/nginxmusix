<!DOCTYPE html>
<html lang="en" data-theme="dark" data-theme-mode="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Private nginx music player">
  <title>Nginx Musix</title>
  <link rel="stylesheet" href="./styles/tokens.css">
  <link rel="stylesheet" href="./styles/themes.css">
  <link rel="stylesheet" href="./styles/layout.css">
  <link rel="stylesheet" href="./styles/components.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <header class="player-bar">
      <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Open menu">Menu</button>

      <div class="transport-controls">
        <button id="shuffle-btn" type="button" class="control-btn icon-btn" title="Shuffle" aria-label="Shuffle">
          <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 4h4v4"></path>
            <path d="M20 4l-7 7"></path>
            <path d="M4 6h3l4 4"></path>
            <path d="M4 18h3l9-9"></path>
            <path d="M16 20h4v-4"></path>
          </svg>
          <span class="sr-only">Shuffle</span>
        </button>
        <button id="prev-btn" type="button" class="control-btn icon-btn" title="Previous" aria-label="Previous">
          <svg class="control-icon control-icon-fill" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="5" width="2.5" height="14" rx="1.2"></rect>
            <path d="M18.5 6.2v11.6a.8.8 0 0 1-1.26.65l-7.65-5.8a.8.8 0 0 1 0-1.3l7.65-5.8a.8.8 0 0 1 1.26.65z"></path>
          </svg>
          <span class="sr-only">Previous</span>
        </button>
        <button id="play-pause-btn" type="button" class="control-btn control-btn-primary icon-btn" title="Play" aria-label="Play">
          <svg class="control-icon control-icon-fill icon-play" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8.8 5.5L19 12 8.8 18.5z"></path>
          </svg>
          <svg class="control-icon control-icon-fill icon-pause" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="7.5" y="5.5" width="3.8" height="13" rx="1"></rect>
            <rect x="12.7" y="5.5" width="3.8" height="13" rx="1"></rect>
          </svg>
          <span class="sr-only">Play</span>
        </button>
        <button id="next-btn" type="button" class="control-btn icon-btn" title="Next" aria-label="Next">
          <svg class="control-icon control-icon-fill" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="16.5" y="5" width="2.5" height="14" rx="1.2"></rect>
            <path d="M5.5 6.2v11.6a.8.8 0 0 0 1.26.65l7.65-5.8a.8.8 0 0 0 0-1.3l-7.65-5.8a.8.8 0 0 0-1.26.65z"></path>
          </svg>
          <span class="sr-only">Next</span>
        </button>
        <button id="repeat-btn" type="button" class="control-btn icon-btn" title="Repeat" aria-label="Repeat">
          <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17 2l3 3-3 3"></path>
            <path d="M4 11V9a4 4 0 0 1 4-4h12"></path>
            <path d="M7 22l-3-3 3-3"></path>
            <path d="M20 13v2a4 4 0 0 1-4 4H4"></path>
          </svg>
          <span class="repeat-one-badge" aria-hidden="true">1</span>
          <span class="sr-only">Repeat</span>
        </button>
      </div>

      <div class="now-playing">
        <div class="cover-frame">
          <img id="player-cover" src="./assets/default-note.png" data-default-cover="./assets/default-note.png" alt="Default note cover" />
        </div>
        <div class="now-playing-meta">
          <strong id="player-title">Nothing is playing</strong>
          <span id="player-artist">Choose a track to begin</span>
          <div class="seekline">
            <span id="elapsed-label">0:00</span>
            <input id="seek-slider" type="range" min="0" max="1000" value="0" />
            <span id="duration-label">0:00</span>
          </div>
        </div>
      </div>

      <div class="volume-wrap">
        <button id="mute-btn" type="button" class="control-btn icon-btn" title="Mute" aria-label="Mute">
          <svg id="volume_icon_svg" class="control-icon control-icon-fill volume-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path transform="translate(2,11.149)" d="m23.477 39.911c1.4129 0 2.431-1.0389 2.431-2.431v-33.141c0-1.3921-1.0181-2.5349-2.4726-2.5349-1.0181 0-1.7038 0.43634-2.805 1.4752l-9.2046 8.6644c-0.14545 0.12464-0.31166 0.18698-0.51945 0.18698h-6.2126c-2.9297 0-4.5088 1.5999-4.5088 4.7374v8.0411c0 3.1167 1.5791 4.7166 4.5088 4.7166h6.2126c0.20779 0 0.374 0.06234 0.51945 0.18698l9.2046 8.7475c0.99732 0.93501 1.8285 1.3506 2.8466 1.3506z"></path>
            <path transform="translate(2,11.149)" d="m34.864 29.959c0.70647 0.49868 1.7246 0.35323 2.3271-0.47787 1.6205-2.1817 2.5971-5.3815 2.5971-8.6436 0-3.2621-0.9766-6.4411-2.5971-8.6436-0.60255-0.83111-1.5999-0.97655-2.3271-0.49868-0.89345 0.62336-1.0181 1.683-0.35319 2.5765 1.2051 1.6207 1.9323 4.0932 1.9323 6.5658 0 2.4726-0.76881 4.9451-1.9531 6.5866-0.62332 0.89345-0.51945 1.9116 0.374 2.5349z"></path>
            <path transform="translate(2,11.149)" d="m43.154 35.569c0.81021 0.54023 1.8077 0.33245 2.3894-0.49867 2.7426-3.8231 4.3426-8.9137 4.3426-14.233 0-5.3399-1.5583-10.451-4.3426-14.254-0.60255-0.81034-1.5791-1.0181-2.3894-0.47787-0.78979 0.54021-0.91447 1.5583-0.29106 2.4518 2.2647 3.3245 3.6779 7.6878 3.6779 12.28s-1.3923 8.9969-3.6779 12.28c-0.60255 0.89345-0.49872 1.9116 0.29106 2.4518z"></path>
            <path transform="translate(2,11.149)" d="m51.527 41.241c0.76894 0.51945 1.7872 0.31166 2.3898-0.54021 3.8438-5.423 6.0255-12.446 6.0255-19.864s-2.2443-14.42-6.0255-19.864c-0.60255-0.87268-1.6209-1.0805-2.3898-0.54021-0.78936 0.56098-0.91404 1.5791-0.31149 2.4518 3.3451 4.9244 5.423 11.241 5.423 17.952 0 6.7113-1.9945 13.132-5.423 17.952-0.60255 0.87268-0.47787 1.8908 0.31149 2.4518z"></path>
          </svg>
          <span class="sr-only">Mute</span>
        </button>
        <input id="volume-slider" type="range" min="0" max="100" value="100" />
      </div>
    </header>

    <div class="shell-body">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="#/home" class="brand">Nginx Musix</a>
          <button id="sidebar-collapse-btn" class="collapse-btn" type="button" aria-label="Collapse sidebar">Collapse</button>
        </div>

        <form id="sidebar-search-form" class="sidebar-search">
          <input id="sidebar-search-input" type="search" placeholder="Search tracks, artists, albums, tags" autocomplete="off" />
          <button type="submit">Go</button>
        </form>

        <nav class="sidebar-nav" id="sidebar-nav">
          <a href="#/home" data-nav="home">Home</a>
          <a href="#/songs" data-nav="songs">Songs</a>
          <a href="#/playlists" data-nav="playlists">Playlists</a>
          <a href="#/tags" data-nav="tags">Tags</a>
        </nav>

        <div class="sidebar-footer">
          <label for="theme-select">Theme</label>
          <select id="theme-select">
            <option value="system">System</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
      </aside>

      <main class="view-root" id="view-root">
        <div class="loading-panel">Loading library...</div>
      </main>
    </div>
  </div>

  <div class="toast-region" id="toast-region" aria-live="polite"></div>
  <audio id="audio-element" preload="metadata"></audio>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
